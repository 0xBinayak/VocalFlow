name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        run: uv build

      - name: Create source archive
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mkdir -p release
          tar czf release/vocalflow-${VERSION}-source.tar.gz \
            --exclude='.git' \
            --exclude='.venv' \
            --exclude='__pycache__' \
            --exclude='audio/*.wav' \
            --exclude='uploads/*' \
            --exclude='transcripts/*.json' \
            --exclude='history.json' \
            --exclude='.sesskey' \
            .
          cp dist/*.whl release/ 2>/dev/null || true
          cp dist/*.tar.gz release/vocalflow-${VERSION}-sdist.tar.gz 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
