name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check syntax
        run: python -m py_compile app.py && python -m py_compile transcribe.py

      - name: Install ruff
        run: uv tool install ruff

      - name: Lint
        run: ruff check app.py transcribe.py
